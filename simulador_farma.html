<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Farmacología USC</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--accent:#3b82f6;--correct:#22c55e;--wrong:#ef4444;--text:#e2e8f0;--muted:#64748b;--border:#1e2d45}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(59,130,246,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:780px;padding:20px}
header{text-align:center;padding:40px 0 30px}
.logo{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;line-height:1.1;background:linear-gradient(135deg,#e2e8f0 0%,#93c5fd 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:14px;color:var(--muted);margin-top:8px}
#tema-screen{animation:fadeUp .4s ease}
.tema-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}
@media(max-width:540px){.tema-grid{grid-template-columns:1fr}}
.tema-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;text-align:left;transition:all .2s;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;display:flex;align-items:center;gap:12px}
.tema-btn:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-2px)}
.tema-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);min-width:28px}
.tema-name{font-weight:500;line-height:1.3}
.tema-count{font-size:11px;color:var(--muted);margin-top:2px}
.btn-todos{width:100%;margin-top:10px;background:linear-gradient(135deg,var(--accent),#6366f1);border:none;border-radius:12px;padding:16px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:white;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.btn-todos:hover{opacity:.9;transform:translateY(-2px)}
#quiz-screen{display:none;animation:fadeUp .4s ease}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.back-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;font-family:'DM Sans',sans-serif}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.stats-bar{display:flex;gap:16px;font-size:13px;color:var(--muted)}
.stat{display:flex;align-items:center;gap:5px}
.stat-val{font-weight:700;color:var(--text)}
.correct-val{color:var(--correct)}
.wrong-val{color:var(--wrong)}
.progress-bar{width:100%;height:3px;background:var(--surface2);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#6366f1);border-radius:2px;transition:width .4s ease}
.tema-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
.pregunta-num{font-family:'Syne',sans-serif;font-size:12px;color:var(--muted);margin-bottom:14px}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px}
.question-text{font-size:16px;line-height:1.6;font-weight:500;margin-bottom:24px}
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);transition:all .2s;display:flex;align-items:flex-start;gap:12px}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(59,130,246,.08)}
.option-btn:disabled{cursor:default}
.option-btn.correct{border-color:var(--correct);background:rgba(34,197,94,.12)}
.option-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,.12)}
.option-letter{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--muted);min-width:20px;margin-top:1px}
.option-btn.correct .option-letter{color:var(--correct)}
.option-btn.wrong .option-letter{color:var(--wrong)}
.feedback-box{display:none;border-radius:12px;padding:16px 20px;margin-bottom:16px;font-size:14px;line-height:1.5;animation:fadeUp .3s ease}
.feedback-box.show{display:block}
.feedback-box.correct-fb{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
.feedback-box.wrong-fb{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.feedback-box strong{display:block;margin-bottom:4px;font-size:15px}
.action-row{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.btn-next{background:linear-gradient(135deg,var(--accent),#6366f1);border:none;border-radius:10px;padding:12px 28px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:none}
.btn-next:hover{opacity:.9}
.btn-next.show{display:block}
.btn-stop{background:transparent;border:1px solid var(--border);border-radius:10px;padding:12px 20px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;display:none}
.btn-stop:hover{border-color:var(--wrong);color:var(--wrong)}
.btn-stop.show{display:block}
#result-screen{display:none;text-align:center;animation:fadeUp .4s ease;padding:40px 0}
.result-circle{width:140px;height:140px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 24px;background:var(--surface)}
.result-pct{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(135deg,#e2e8f0,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-label{font-size:12px;color:var(--muted)}
.result-stats{display:flex;justify-content:center;gap:30px;margin:20px 0 30px;flex-wrap:wrap}
.rs{text-align:center}
.rs-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
.rs-lbl{font-size:12px;color:var(--muted)}
.btn-restart{background:linear-gradient(135deg,var(--accent),#6366f1);border:none;border-radius:12px;padding:14px 32px;color:white;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin:6px}
.btn-restart:hover{opacity:.9}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
<header>
<div class="logo">USC · Medicina · 2021–2025</div>
<h1>Simulador Farmacología</h1>
<p class="subtitle">Recopilatorio por temas · 223 preguntas</p>
</header>
<div id="tema-screen">
<div class="tema-grid" id="tema-grid"></div>
<button class="btn-todos" onclick="startQuiz('todos')">▶ Todos los temas mezclados</button>
</div>
<div id="quiz-screen">
<div class="quiz-header">
<button class="back-btn" onclick="goHome()">← Temas</button>
<div class="stats-bar">
<div class="stat">✓ <span class="stat-val correct-val" id="cnt-ok">0</span></div>
<div class="stat">✗ <span class="stat-val wrong-val" id="cnt-ko">0</span></div>
<div class="stat">📋 <span class="stat-val" id="cnt-tot">0</span></div>
</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
<div class="tema-label" id="quiz-tema-label"></div>
<div class="pregunta-num" id="quiz-ref"></div>
<div class="question-card">
<div class="question-text" id="question-text"></div>
<div class="options" id="options-container"></div>
</div>
<div class="feedback-box" id="feedback-box"></div>
<div class="action-row">
<button class="btn-stop" id="btn-stop" onclick="showResults()">Parar y ver resultados</button>
<button class="btn-next" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
</div>
</div>
<div id="result-screen">
<div class="result-circle">
<div class="result-pct" id="res-pct">—</div>
<div class="result-label">aciertos</div>
</div>
<div class="result-stats">
<div class="rs"><div class="rs-val" style="color:var(--correct)" id="res-ok">0</div><div class="rs-lbl">Correctas</div></div>
<div class="rs"><div class="rs-val" style="color:var(--wrong)" id="res-ko">0</div><div class="rs-lbl">Incorrectas</div></div>
<div class="rs"><div class="rs-val" id="res-tot">0</div><div class="rs-lbl">Respondidas</div></div>
</div>
<button class="btn-restart" onclick="goHome()">← Volver a temas</button>
<button class="btn-restart" onclick="retryTema()">↺ Repetir tema</button>
</div>
</div>
<script>
const TEMAS=[{id:1,name:"Principios generales de acción"},{id:2,name:"SNA y placa motora"},{id:3,name:"Inflamación, dolor y fiebre"},{id:4,name:"Farmacología del SNC"},{id:5,name:"Farmacología cardiovascular"},{id:6,name:"Farmacología de la sangre"},{id:7,name:"Aparato respiratorio"},{id:8,name:"Aparato digestivo"},{id:9,name:"Sistema endocrino"},{id:10,name:"Neoplasia e inmunidad"},{id:11,name:"Procesos infecciosos y antiparasitarios"}];
const Q=[
// PARTE I
{t:1,r:"17(2025)",q:"¿Cuál es la concentración mínima eficaz de un fármaco?",o:["Aquella por debajo de la cual suelen observarse efectos adversos","Aquella por encima de la cual suelen observarse efectos terapéuticos","Aquella por encima de la cual suelen observarse efectos tóxicos","Aquella por debajo de la cual suelen observarse efectos terapéuticos"],a:1},
{t:1,r:"26(2025)",q:"Para que dos formulaciones con un mismo principio activo se consideren especialidad farmacéutica genérica debe demostrarse:",o:["Que son biosimilares","Que tienen la misma vida media","Que son bioequivalentes","Que tienen la misma duración de efecto"],a:2},
{t:1,r:"29(2025)",q:"La biodisponibilidad sistémica de un fármaco:",o:["No depende de las condiciones fisiopatológicas de cada paciente","No depende de la vía de administración del fármaco","No se ve afectada por las enzimas digestivas","Está relacionada con la cantidad de fármaco que alcanza la circulación sistémica en estado inalterado"],a:3},

{t:1,r:"47(2025)",q:"La afinidad de un fármaco agonista:",o:["Se calcula como la inversa de la dosis eficaz cincuenta","Se calcula como el menos logaritmo de la dosis eficaz cincuenta","Es el cincuenta por ciento de la respuesta de un fármaco","Es igual a la dosis eficaz cincuenta"],a:0},
{t:1,r:"48(2025)",q:"La capacidad de un receptor para discriminar entre una molécula de ligando de otra se denomina:",o:["Actividad intrínseca","Potencia del receptor","Especificidad","Afinidad"],a:2},
{t:1,r:"49(2025)",q:"Si la histamina y la adrenalina actúan sobre distintos receptores y un mismo órgano con efectos cualitativamente opuestos, el antagonismo entre ellos es:",o:["Competitivo","No competitivo","Químico","Fisiológico"],a:3},

{t:1,r:"78(2025)",q:"¿Cuál es correcta sobre el paso de fármacos por difusión pasiva?",o:["Los ácidos débiles atraviesan mejor cuando el pH es más alcalino","Las bases débiles atraviesan mejor cuando el pH es más ácido","Los ácidos débiles atraviesan mejor cuando el pH es más ácido","Ninguna de las anteriores es correcta"],a:2},
{t:1,r:"79(2025)",q:"¿Cuál de las siguientes vías de administración enteral evita TOTALMENTE el primer paso hepático?",o:["Oral","Rectal","Sublingual","Ninguna de las anteriores es correcta"],a:2},
{t:1,r:"80(2025)",q:"¿Cuál es cierta sobre la unión de fármacos a proteínas plasmáticas?",o:["La fracción unida se elimina fácilmente por filtración glomerular","En hipoproteinemia puede aumentar la actividad y la toxicidad del fármaco","No es saturable ni competitiva","No es reversible"],a:1},
{t:1,r:"81(2025)",q:"Dosis i.v. de carga del fármaco X (Vd=2 L/kg, paciente 60 kg) para concentración plasmática de 0,5 mg/L:",o:["40 mg","80 mg","30 mg","60 mg"],a:3},
{t:1,r:"82(2025)",q:"¿En cuál de las siguientes vías de administración se alcanza mayor biodisponibilidad?",o:["Subcutánea","Oral","Intramuscular","Intraósea"],a:3},
{t:1,r:"83(2025)",q:"¿Qué sistema de transporte predomina en el paso de fármacos a la leche materna?",o:["Transporte activo","Difusión pasiva","Pinocitosis","Difusión facilitada a través de proteínas"],a:1},
{t:1,r:"27(2023)",q:"Un fármaco con semivida de 10h, ¿cuándo alcanza el equilibrio?",o:["20h","33h","50h","60h"],a:2},

{t:1,r:"29(2023)",q:"Señale la FALSA sobre la biodisponibilidad:",o:["Cantidad absorbida por vía oral","Cantidad absorbida por una vía comparada con la vía iv","Cantidad en la circulación sistémica","Biodisponibilidad iv es igual al 100%"],a:0},
{t:1,r:"30(2023)",q:"La capacidad por la que el receptor distingue sustancias se llama:",o:["Actividad intrínseca","Potencia","Especificidad","Afinidad"],a:2},

{t:1,r:"32(2023)",q:"2 fármacos agonistas se unen a distintos receptores y tienen distinto efecto. ¿Qué tipo de antagonismo hay?",o:["Competitivo","No competitivo","Químico","Fisiológico"],a:3},
{t:1,r:"1(2022)",q:"¿Qué parte de la farmacología estudia lo que el fármaco hace al organismo (efectos bioquímicos, fisiológicos y mecanismo de acción)?",o:["Farmacodinamia","Farmacogenética","Farmacognosia","Farmacocinética"],a:0},
{t:1,r:"2(2022)",q:"¿Cuál de las siguientes afirmaciones es cierta?",o:["Los más ionizados atraviesan mejor las membranas por difusión pasiva","Los ácidos débiles se ionizan menos en pH más básico y son más liposolubles","Los ácidos débiles se ionizan menos en pH más ácido y atraviesan mejor las membranas por difusión pasiva","El grado de ionización no influye en la liposolubilidad"],a:2},
{t:1,r:"3(2022)",q:"Biodisponibilidad cuando la vía es intravenosa:",o:["f = 0","f = 0,5","f = 1","f > 1"],a:2},
{t:1,r:"4(2022)",q:"Vd morfina=0,5 L/kg. Calcular la dosis si el peso es 70 kg y la concentración plasmática 0,3 mg/L:",o:["5 mg","10,5 mg","21 mg","35 mg"],a:1},
{t:1,r:"5(2022)",q:"Algunos metabolitos conjugados excretados por vía biliar se reactivan en el intestino y se reabsorben. Este proceso se denomina:",o:["Fenómeno de primer paso","Circulación enterohepática","Reacción de fase II","Ninguna de las anteriores"],a:1},

{t:1,r:"54(2022)",q:"La capacidad de un receptor para discriminar entre moléculas de ligando se denomina:",o:["Actividad intrínseca","Potencia del receptor","Afinidad","Especificidad"],a:3},
{t:1,r:"55(2022)",q:"La afinidad del agonista:",o:["Cálculo inverso a la dosis eficaz 50","–log dosis eficaz 50","50% respuesta fármaco","Igual dosis"],a:0},

{t:1,r:"59(2021)",q:"¿Cuál de las siguientes afirmaciones sobre la unión de fármacos a proteínas plasmáticas es FALSA?",o:["Constituye una cifra estable para cada fármaco","Sólo la fracción libre es la activa","Es una unión reversible","No es una unión saturable"],a:3},

// Combine all question arrays
const ALL_Q=[...Q,...Q2,...Q3,...Q4,...Q5,...Q6];

let queue=[],current=null,answered=false,cntOk=0,cntKo=0,cntTot=0,currentTemaId=null;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function buildTemaGrid(){
  const grid=document.getElementById('tema-grid');
  grid.innerHTML='';
  TEMAS.forEach(t=>{
    const count=ALL_Q.filter(p=>p.t===t.id).length;
    const btn=document.createElement('button');
    btn.className='tema-btn';
    btn.innerHTML=`<span class="tema-num">${t.id}</span><div><div class="tema-name">${t.name}</div><div class="tema-count">${count} preguntas</div></div>`;
    btn.onclick=()=>startQuiz(t.id);
    grid.appendChild(btn);
  });
}

function startQuiz(temaId){
  currentTemaId=temaId;
  const pool=temaId==='todos'?[...ALL_Q]:ALL_Q.filter(p=>p.t===temaId);
  queue=shuffle([...pool]);
  cntOk=0;cntKo=0;cntTot=0;
  document.getElementById('tema-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  updateCounters();
  nextQuestion();
}

function retryTema(){startQuiz(currentTemaId)}

function nextQuestion(){
  if(queue.length===0){showResults();return}
  current=queue.shift();
  answered=false;
  const tema=TEMAS.find(t=>t.id===current.t);
  document.getElementById('quiz-tema-label').textContent=`Parte ${current.t} · ${tema?tema.name:''}`;
  document.getElementById('quiz-ref').textContent=`Ref: ${current.r}`;
  document.getElementById('question-text').textContent=current.q;
  const opts=document.getElementById('options-container');
  opts.innerHTML='';
  const letters=['a','b','c','d','e'];
  current.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-letter">${letters[i]})</span><span>${opt}</span>`;
    btn.onclick=()=>selectAnswer(i);
    opts.appendChild(btn);
  });
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box';
  fb.textContent='';
  document.getElementById('btn-next').className='btn-next';
  document.getElementById('btn-stop').className='btn-stop show';
  updateProgress();
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  cntTot++;
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.disabled=true);
  const correct=current.a;
  btns[correct].classList.add('correct');
  const fb=document.getElementById('feedback-box');
  if(idx===correct){
    cntOk++;
    btns[idx].classList.add('correct');
    fb.className='feedback-box correct-fb show';
    fb.innerHTML='<strong>✓ ¡Correcto!</strong>';
  } else {
    cntKo++;
    btns[idx].classList.add('wrong');
    const letters=['a','b','c','d','e'];
    fb.className='feedback-box wrong-fb show';
    fb.innerHTML=`<strong>✗ Incorrecto</strong>La respuesta correcta es: <b>${letters[correct]}) ${current.o[correct]}</b>`;
  }
  updateCounters();
  document.getElementById('btn-next').className='btn-next show';
  document.getElementById('btn-next').textContent=queue.length>0?'Siguiente →':'Ver resultados';
}

function updateCounters(){
  document.getElementById('cnt-ok').textContent=cntOk;
  document.getElementById('cnt-ko').textContent=cntKo;
  document.getElementById('cnt-tot').textContent=cntTot;
}

function updateProgress(){
  const total=ALL_Q.filter(p=>currentTemaId==='todos'||p.t===currentTemaId).length;
  const pct=total>0?Math.min(100,(cntTot/total)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
}

function showResults(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const pct=cntTot>0?Math.round((cntOk/cntTot)*100):0;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-ok').textContent=cntOk;
  document.getElementById('res-ko').textContent=cntKo;
  document.getElementById('res-tot').textContent=cntTot;
}

function goHome(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('tema-screen').style.display='block';
}

buildTemaGrid();
</script>
